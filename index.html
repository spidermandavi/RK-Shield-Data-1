<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>RK Shield Arena Analyzer</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>
<body>

  <div class="container">

    <h1>
      RK Shield Arena Analyzer
    </h1>

    <div class="input-area">

      <input
        id="tournamentInput"
        type="text"
        placeholder="Paste Lichess tournament URL"
      />

      <button id="analyzeBtn">
        Analyze Tournament
      </button>

    </div>

    <div class="actions">

      <button id="copyTextBtn">
        Copy Text Stats
      </button>

      <button id="copyJsonBtn">
        Copy JSON
      </button>

    </div>

    <pre id="statsOutput">

Paste a Lichess tournament link above
and press "Analyze Tournament".

Example:
https://lichess.org/tournament/xxxxxxxx

    </pre>

  </div>

  <script src="app.js"></script>

</body>
</html>
